    ; ideaspark ESP32 (ESP32-WROOM-32) + onboard 1.14" ST7789 135x240 color TFT
; Project: Spotify "Now Playing" display
;
; NOTE: This board looks like a TTGO T-Display but the display pins are
; DIFFERENT. The build_flags below are the verified ideaspark pinout.

[env:ideaspark]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43

; --- ideaspark 1.14" ST7789 display config (passed to TFT_eSPI) ---
build_flags =
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=32
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    ; For quick testing of the break loop, append: -DWORK_SECONDS=60 -DBREAK_SECONDS=15
    ; If colors look inverted, add:   -DTFT_INVERSION_OFF
    ; If colors are still wrong, try:  -DTFT_RGB_ORDER=TFT_BGR
